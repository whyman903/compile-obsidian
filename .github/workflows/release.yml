name: Release MyWiki.app

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Build MyWiki.app
        run: ./scripts/build-mywiki-app.sh

      - name: Zip MyWiki.app
        run: |
          mkdir -p artifacts
          ditto -c -k --keepParent dist/MyWiki.app artifacts/MyWiki.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyWiki.app
          path: artifacts/MyWiki.app.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/MyWiki.app.zip
          generate_release_notes: true
          body: |
            Download `MyWiki.app.zip`, unzip, and drag MyWiki.app to /Applications.

            The build is ad-hoc signed (not notarized). On first launch you may need to clear the quarantine flag:

            ```
            xattr -dr com.apple.quarantine /Applications/MyWiki.app
            open /Applications/MyWiki.app
            ```
